name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  matlab:
    name: MATLAB build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024b

      - name: Run mocked tests, static analysis, and package
        uses: matlab-actions/run-build@v2
        with:
          tasks: package

      - name: Upload toolbox artifact
        uses: actions/upload-artifact@v4
        with:
          name: matlab-fmp
          path: dist/matlab-fmp.mltbx
          if-no-files-found: error
