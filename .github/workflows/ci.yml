name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  matlab:
    name: MATLAB build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2024b

      - name: Run mocked tests, static analysis, and package
        run: matlab -batch "buildtool package"

      - name: Upload toolbox artifact
        uses: actions/upload-artifact@v5
        with:
          name: matlab-fmp
          path: dist/matlab-fmp.mltbx
          if-no-files-found: error
