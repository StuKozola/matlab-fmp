name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish toolbox
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2024b

      - name: Build toolbox package
        run: matlab -batch "buildtool package"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          dist/matlab-fmp.mltbx
          --title "matlab-fmp ${{ github.ref_name }}"
          --notes "MATLAB toolbox package for Financial Modeling Prep data."
