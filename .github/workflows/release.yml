name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish toolbox
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2024b

      - name: Build toolbox package
        uses: matlab-actions/run-build@v2
        with:
          tasks: package

      - name: Extract release notes
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 ~ "^## v" version " - " { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/d' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "MATLAB toolbox package for Financial Modeling Prep data." > release-notes.md
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          dist/matlab-fmp.mltbx
          --title "matlab-fmp ${{ github.ref_name }}"
          --notes-file release-notes.md
